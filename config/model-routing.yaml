# Per-stage LLM routing for the intelligence pipeline.
#
# Each stage maps to a provider + model + timeout. The LLM client
# (worker/clawfeed_intel/llm/client.py) resolves the stage at call time and
# dispatches against the named provider's endpoint.
#
# ── Phase 1 placeholder models ────────────────────────────────────────────
# The architecture doc names these as the doc-target stack:
#   source_planning  → Qwen/Qwen3.6-35B-A3B
#   relevance_filter → mlx-community/Qwen3.5-122B-A10B-4bit
#   cluster_summary  → mlx-community/Qwen3.5-122B-A10B-4bit
#   final_compose    → gemini_cli / gemini-2.5-pro (with vmlx Tier-2 fallback)
#                      (2026-05-15 amendment: was openclaw/gpt-5.3-codex;
#                       2026-05-15 Step 12c correction: was gemini-3-pro,
#                       which the live CLI v0.36.0 returns 404 on)
#
# As of 2026-05-06 the doc-target local flagships (Qwen3.5-122B-A10B-4bit,
# ~70G; Qwen3.6-35B-A3B) are NOT on disk. Phase 1 substitutes models that
# already live in ~/.cache/huggingface/hub/. Swapping in the doc-target
# models when downloaded is a YAML edit — no code change.
#
# ── gemini_cli provider (Step 12b) ────────────────────────────────────────
# Final composition routes to the Gemini CLI subprocess provider. The
# 2026-05-15 amendment replaced the originally-planned OpenClaw gateway
# transport — see docs/personal-intelligence-brief-architecture.md
# "Decision 4 amendment" and the status doc's scope-changes entry for
# the rationale. `executable_path` hardcodes the working node v25.9.0
# binary because /opt/homebrew/opt/node@22 (first on PATH) is linked
# against an absent simdjson.30 dylib; the gemini CLI's shebang resolves
# via PATH and picks the broken one. Environmental fix is tracked in
# status doc; this routing-config override is the mitigation that
# unblocks the worker today.
#
# AUTH MODEL — load-bearing, do not change without re-reading Decision 4:
# the CLI is signed into the operator's Gemini Pro subscription via
# OAuth (run `gemini` interactively to re-auth). The worker does NOT
# hold an API key, does NOT call generativelanguage.googleapis.com,
# and does NOT incur per-token cost. Quota is the Pro plan ceiling.
# There is intentionally no `api_key_env` field for this provider.

providers:
  vmlx:
    base_url: http://127.0.0.1:8080/v1
    api_key_env: VMLX_API_KEY

  gemini_cli:
    executable_path: /opt/homebrew/bin/node
    script_path: /opt/homebrew/bin/gemini
    approval_mode: plan
    output_format: stream-json
    idle_timeout_seconds: 60
    hard_timeout_seconds: 300
    retries: 1
    retry_backoff_seconds: 10

stages:
  source_planning:
    provider: vmlx
    model: mlx-community/Qwen3-8B-4bit
    timeout_seconds: 90

  relevance_filter:
    provider: vmlx
    model: mlx-community/Qwen3.5-27B-4bit
    timeout_seconds: 240
    batch_size: 12

  cluster_summary:
    provider: vmlx
    model: mlx-community/Qwen3.5-27B-4bit
    timeout_seconds: 300

  final_compose:
    # Tier 1: frontier compose via Gemini CLI. Architecture-doc
    # non-negotiable: the final brief is composed by a frontier-class
    # model. `timeout_seconds` mirrors the provider's hard_timeout for
    # readability; the actual enforcement lives in the provider's
    # per-line idle + wall-clock checks.
    provider: gemini_cli
    # gemini-2.5-pro is Google's current Pro-subscription frontier model
    # the CLI v0.36.0 routes to. The architecture doc's `gemini-3-pro`
    # (named pre-Step-12c) returns 404 against this CLI version + Pro
    # account — verified by the Step 12c live precheck (2026-05-15).
    model: gemini-2.5-pro
    timeout_seconds: 300
    fallback:
      # Tier 2: local vMLX with the strongest cached model. The
      # architecture-doc target is Qwen3.5-122B-A10B-4bit; until that
      # lands on disk we route to the 27B-4bit placeholder (already
      # validated by the 2026-05-15 compose smoke).
      provider: vmlx
      model: mlx-community/Qwen3.5-27B-4bit
